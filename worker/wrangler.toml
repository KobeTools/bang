name = "rebang-redirect"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Routes - Worker handles requests to rebang.online
routes = [
  { pattern = "rebang.online/*", zone_name = "rebang.online" },
  { pattern = "www.rebang.online/*", zone_name = "rebang.online" }
]

[vars]
# Vercel origin for non-redirect requests
ORIGIN_URL = "https://rebang.online"
